<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>mpv music wrapper</title>
  <meta name="google-site-verification" content="JN7QoOFeUHKXZEYTa5kQon8zjnyK5hSpoZCrBBSdPPw">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { font-family: sans-serif; margin: 2rem auto; max-width: 900px; line-height: 1.6; padding: 0 1rem; }
    pre { white-space: pre-wrap; }
  </style>
</head>
<body>
  <main id="content">Loading README...</main>
  <script>
    const README_URL = "https://raw.githubusercontent.com/julienmn/mpv-music-wrapper/main/README.md";
    fetch(README_URL)
      .then((res) => res.text())
      .then((md) => {
        document.getElementById("content").innerHTML = marked.parse(md);
      })
      .catch((err) => {
        document.getElementById("content").textContent = "Failed to load README: " + err;
      });
  </script>
</body>
</html>
